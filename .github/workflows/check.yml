name: check

on:
  # reused by main.yml (PR + trunk) and update-dependencies.yml (bumped branch)
  workflow_call:
    inputs:
      ref:
        description: Git ref to check out and test (defaults to the triggering ref)
        type: string
        default: ''

permissions:
  contents: read
  checks: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      ESLINT_JUNIT_OUTPUT_FILE: reports/lint.junit.xml
      JEST_JUNIT_OUTPUT_FILE: reports/test.junit.xml
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # empty ref → checkout's default (the triggering ref); set by callers to test a branch
          ref: ${{ inputs.ref }}
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run docs:build:readmes
      - run: npm run lint -- --format junit --output-file ${ESLINT_JUNIT_OUTPUT_FILE}
      - run: npm run test -- --ci --reporters=default --reporters=jest-junit
      - uses: mikepenz/action-junit-report@d9f48fc87bc235f7e214acf696ca5abc0a986f16 # v6.4.2
        if: success() || failure()
        with:
          check_name: Report
          include_passed: true
          report_paths: reports/*.junit.xml
